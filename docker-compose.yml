version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: resume_analyzer_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_analyzer

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: resume_analyzer_backend

    restart: always

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      - postgres
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: 262231660312-iuf5hh93pfrb3l2c4oggr3rsf48n6j6d.apps.googleusercontent.com

    container_name: resume_analyzer_frontend

    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: