version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: resume_analyzer_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_analyzer

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: resume_analyzer_backend

    restart: always

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      - postgres

volumes:
  postgres_data: